# Production stack — built images, no source bind mounts.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

name: itu-prod

x-prod-build: &prod-build
  context: .
  dockerfile: Dockerfile

x-prod-extra-hosts: &prod-extra-hosts
  - host.docker.internal:host-gateway

x-prod-common-env: &prod-common-env
  NODE_ENV: production
  NODE_OPTIONS: --dns-result-order=ipv4first
  REDIS_URL: redis://redis:6379

services:
  redis:
    image: redis:7-alpine
    container_name: itu-prod-redis
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: "0.5"
    networks:
      - itu

  socket:
    build: *prod-build
    container_name: itu-prod-socket
    command: npm run socket:server
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      <<: *prod-common-env
      SOCKET_BIND_HOST: 0.0.0.0
      SOCKET_PORT: "3001"
      SOCKET_SERVER_URL: http://socket:3001
    extra_hosts: *prod-extra-hosts
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 256m
    cpus: "0.25"
    networks:
      - itu

  web:
    build: *prod-build
    container_name: itu-prod-web
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      <<: *prod-common-env
      SOCKET_SERVER_URL: http://socket:3001
      CRON_PROVIDER_SYNC_BASE_URL: http://web:3000
    volumes:
      - file_storage:/app/storage/uploads
    extra_hosts: *prod-extra-hosts
    depends_on:
      redis:
        condition: service_healthy
      socket:
        condition: service_healthy
    restart: always
    mem_limit: 2g
    cpus: "2"
    networks:
      - itu

  worker:
    build: *prod-build
    container_name: itu-prod-worker
    command: npm run lcr:worker
    env_file:
      - .env
    environment:
      <<: *prod-common-env
    extra_hosts: *prod-extra-hosts
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f lcr-sync-worker >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    cpus: "1"
    networks:
      - itu

  cron:
    build: *prod-build
    container_name: itu-prod-cron
    command: npm run cron:provider-sync
    env_file:
      - .env
    environment:
      <<: *prod-common-env
      CRON_PROVIDER_SYNC_BASE_URL: http://web:3000
    extra_hosts: *prod-extra-hosts
    depends_on:
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f provider-sync-cron >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    cpus: "0.25"
    networks:
      - itu

  system-plans-availability:
    build: *prod-build
    container_name: itu-prod-system-plans-availability
    command: npm run system-plans:availability
    env_file:
      - .env
    environment:
      <<: *prod-common-env
    extra_hosts: *prod-extra-hosts
    depends_on:
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f system-plans-availability-worker >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: "0.5"
    networks:
      - itu

  system-plans-merge:
    build: *prod-build
    container_name: itu-prod-system-plans-merge
    command: npm run system-plans:merge-duplicates
    env_file:
      - .env
    environment:
      <<: *prod-common-env
    extra_hosts: *prod-extra-hosts
    depends_on:
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f system-plans-duplicate-merge-worker >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: "0.5"
    networks:
      - itu

volumes:
  redis_data:
  file_storage:

networks:
  itu:
    driver: bridge
