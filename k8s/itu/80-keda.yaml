# KEDA Redis Lists scaler — address MUST be host:port (not redis:// URL).
# Auth via TriggerAuthentication → Secret REDIS_PASSWORD.
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: itu-redis-auth
  namespace: itu
spec:
  secretTargetRef:
    - parameter: password
      name: itu-app-secrets
      key: REDIS_PASSWORD
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: itu-worker-scaler
  namespace: itu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: itu-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: redis
      metadata:
        # FQDN required: KEDA operator DNS search is not the ScaledObject namespace.
        address: itu-redis.itu.svc.cluster.local:6379
        listName: bull:provider-sync:wait
        listLength: "5"
        activationListLength: "0"
        databaseIndex: "0"
      authenticationRef:
        name: itu-redis-auth
