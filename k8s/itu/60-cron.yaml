apiVersion: apps/v1
kind: Deployment
metadata:
  name: itu-cron
  namespace: itu
  labels:
    app: itu-cron
    app.kubernetes.io/part-of: itu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: itu-cron
  template:
    metadata:
      labels:
        app: itu-cron
        app.kubernetes.io/part-of: itu
    spec:
      priorityClassName: itu-workers
      terminationGracePeriodSeconds: 20
      containers:
        - name: cron
          image: ghcr.io/techantumsolutions/itu/sidecar@sha256:5cd95837640f6472cc02bf6bc2b83cc328989eb7bee6dcfeb21b4a0cb036babc
          imagePullPolicy: IfNotPresent
          command: ["node", "sidecar-dist/provider-sync-cron.js"]
          envFrom:
            - configMapRef:
                name: itu-config
            - secretRef:
                name: itu-app-secrets
          env:
            - name: SERVICE_NAME
              value: itu-cron
            - name: CRON_PROVIDER_SYNC_BASE_URL
              value: http://itu-web:3000
            - name: SUPABASE_URL
              value: http://supabase-external:8000
            - name: REDIS_URL
              value: redis://itu-redis:6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            exec:
              command: ["/bin/sh", "-ec", "pgrep -f provider-sync-cron >/dev/null"]
            failureThreshold: 18
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pgrep -f provider-sync-cron >/dev/null"]
            periodSeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pgrep -f provider-sync-cron >/dev/null"]
            periodSeconds: 30
            timeoutSeconds: 5
