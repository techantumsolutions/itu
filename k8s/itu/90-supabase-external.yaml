# Bridge from K3s to host Docker Compose Supabase Kong (intentional external infra).
# Host publishes Kong on 0.0.0.0:8000; docker0 gateway is 172.17.0.1 on this node.
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-external
  namespace: itu
  labels:
    app.kubernetes.io/part-of: itu
spec:
  type: ClusterIP
  ports:
    - name: kong
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: supabase-external
  namespace: itu
  labels:
    app.kubernetes.io/part-of: itu
subsets:
  - addresses:
      - ip: 172.17.0.1
    ports:
      - name: kong
        port: 8000
        protocol: TCP