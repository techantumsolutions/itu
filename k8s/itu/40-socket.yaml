apiVersion: apps/v1
kind: Deployment
metadata:
  name: itu-socket
  namespace: itu
  labels:
    app: itu-socket
    app.kubernetes.io/part-of: itu
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: itu-socket
  template:
    metadata:
      labels:
        app: itu-socket
        app.kubernetes.io/part-of: itu
    spec:
      priorityClassName: itu-platform
      terminationGracePeriodSeconds: 20
      containers:
        - name: socket
          image: ghcr.io/techantumsolutions/itu/sidecar@sha256:5cd95837640f6472cc02bf6bc2b83cc328989eb7bee6dcfeb21b4a0cb036babc
          imagePullPolicy: IfNotPresent
          command: ["node", "sidecar-dist/socket-server.js"]
          ports:
            - name: socket
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: itu-config
            - secretRef:
                name: itu-app-secrets
          env:
            - name: SERVICE_NAME
              value: itu-socket
            - name: SOCKET_BIND_HOST
              value: "0.0.0.0"
            - name: SOCKET_PORT
              value: "3001"
            - name: SOCKET_SERVER_URL
              value: http://itu-socket:3001
            - name: SUPABASE_URL
              value: http://supabase-external:8000
            - name: REDIS_URL
              value: redis://itu-redis:6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: socket
            failureThreshold: 18
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: socket
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: socket
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: itu-socket
  namespace: itu
  labels:
    app: itu-socket
    app.kubernetes.io/part-of: itu
spec:
  type: ClusterIP
  selector:
    app: itu-socket
  ports:
    - name: socket
      port: 3001
      targetPort: socket
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: itu-socket
  namespace: itu
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: itu-socket
