# Redis — single source of truth for ITU (web, socket, workers, BullMQ, KEDA).
# StatefulSet + PVC + requirepass from Secret.
---
apiVersion: v1
kind: Service
metadata:
  name: itu-redis-headless
  namespace: itu
  labels:
    app: itu-redis
    app.kubernetes.io/part-of: itu
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: itu-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: itu-redis
  namespace: itu
  labels:
    app: itu-redis
    app.kubernetes.io/part-of: itu
spec:
  type: ClusterIP
  selector:
    app: itu-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: itu-redis
  namespace: itu
  labels:
    app: itu-redis
    app.kubernetes.io/part-of: itu
spec:
  serviceName: itu-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: itu-redis
  template:
    metadata:
      labels:
        app: itu-redis
        app.kubernetes.io/part-of: itu
    spec:
      priorityClassName: itu-critical
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: redis
          image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itu-app-secrets
                  key: REDIS_PASSWORD
          command:
            - /bin/sh
            - -ec
            - |
              exec redis-server \
                --requirepass "$REDIS_PASSWORD" \
                --appendonly yes \
                --appendfsync everysec \
                --save 900 1 \
                --save 300 10 \
                --save 60 10000 \
                --dir /data \
                --protected-mode yes
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping | grep -q PONG
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping | grep -q PONG
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: itu-redis
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
