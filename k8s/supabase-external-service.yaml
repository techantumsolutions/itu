apiVersion: v1
kind: Service
metadata:
  name: supabase-external
  namespace: default
spec:
  ports:
    - name: kong
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: supabase-external
  namespace: default
subsets:
  - addresses:
      - ip: 172.17.0.1 # Default Docker bridge IP. Replace with your actual VPS 'docker0' or bridge interface IP.
    ports:
      - name: kong
        port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: default
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-external
  namespace: default
subsets:
  - addresses:
      - ip: 172.17.0.1 # Default Docker bridge IP. Replace with your actual VPS 'docker0' or bridge interface IP.
    ports:
      - name: redis
        port: 6379
