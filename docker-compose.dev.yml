# Full local development stack with hot reload.
# Prerequisite: Supabase on host — npm run supabase:start
# Usage: docker compose -f docker-compose.dev.yml up --build

name: itu-dev

x-dev-build: &dev-build
  context: .
  dockerfile: Dockerfile.dev
  # Align image ENV with prod public build-args (next dev still prefers compose runtime ENV).
  args:
    NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3010}
    NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54421}
    NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    NEXT_PUBLIC_RECAPTCHA_ENABLED: ${NEXT_PUBLIC_RECAPTCHA_ENABLED:-false}

x-dev-volumes: &dev-volumes
  - .:/app
  - dev_node_modules:/app/node_modules

x-dev-extra-hosts: &dev-extra-hosts
  - host.docker.internal:host-gateway

x-dev-common-env: &dev-common-env
  NODE_ENV: development
  NODE_OPTIONS: --dns-result-order=ipv4first
  REDIS_URL: redis://redis:6379
  WATCHPACK_POLLING: "true"
  CHOKIDAR_USEPOLLING: "true"
  SOCKET_SERVER_URL: http://socket:3001
  SOCKET_HOST: socket
  SOCKET_PORT: "3001"
  NEXT_PUBLIC_SOCKET_SERVER_URL: http://localhost:3001
  NEXT_PUBLIC_APP_URL: http://localhost:3010
  CRON_PROVIDER_SYNC_BASE_URL: http://web:3000
  DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54422/postgres
  DIRECT_URL: postgresql://postgres:postgres@host.docker.internal:54422/postgres
  SUPABASE_URL: http://host.docker.internal:54421
  NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54421

services:
  redis:
    image: redis:7-alpine
    container_name: itu-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - itu

  # Live tickets only — web readiness does not wait on socket.
  socket:
    build: *dev-build
    container_name: itu-dev-socket
    command: node sidecar-dist/socket-server.js
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      <<: *dev-common-env
      SOCKET_BIND_HOST: 0.0.0.0
    volumes: *dev-volumes
    extra_hosts: *dev-extra-hosts
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health | grep -q '\"ok\":true'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - itu

  web:
    build: *dev-build
    container_name: itu-dev-web
    ports:
      - "3010:3000"
    env_file:
      - .env
    environment:
      <<: *dev-common-env
    volumes:
      # Bind mount persists public/uploads, storage/reconciliation, data/ on the host.
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_next_cache:/app/.next
    extra_hosts: *dev-extra-hosts
    # Ready = Redis + Supabase only (not Socket.IO).
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health/ready | grep -q '\"ok\":true'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - itu

  # BullMQ + Supabase — does not call web HTTP APIs.
  worker:
    build: *dev-build
    container_name: itu-dev-worker
    command: node sidecar-dist/lcr-sync-worker.js
    env_file:
      - .env
    environment:
      <<: *dev-common-env
    volumes: *dev-volumes
    extra_hosts: *dev-extra-hosts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f lcr-sync-worker >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - itu

  # Calls POST http://web:3000/api/cron/lcr-v2-sync — requires web ready.
  cron:
    build: *dev-build
    container_name: itu-dev-cron
    command: node sidecar-dist/provider-sync-cron.js
    env_file:
      - .env
    environment:
      <<: *dev-common-env
      CRON_PROVIDER_SYNC_RUN_ON_START: "false"
    volumes: *dev-volumes
    extra_hosts: *dev-extra-hosts
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f provider-sync-cron >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - itu

  # Supabase REST only — no web dependency.
  system-plans-availability:
    build: *dev-build
    container_name: itu-dev-system-plans-availability
    command: node sidecar-dist/system-plans-availability-worker.js
    env_file:
      - .env
    environment:
      <<: *dev-common-env
    volumes: *dev-volumes
    extra_hosts: *dev-extra-hosts
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f system-plans-availability-worker >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - itu

  # Supabase REST only — no web dependency.
  system-plans-merge:
    build: *dev-build
    container_name: itu-dev-system-plans-merge
    command: node sidecar-dist/system-plans-duplicate-merge-worker.js
    env_file:
      - .env
    environment:
      <<: *dev-common-env
    volumes: *dev-volumes
    extra_hosts: *dev-extra-hosts
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f system-plans-duplicate-merge-worker >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - itu

volumes:
  redis_data:
  dev_node_modules:
  dev_next_cache:

networks:
  itu:
    driver: bridge
