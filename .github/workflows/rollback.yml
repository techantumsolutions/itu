# Manual production rollback to a previous immutable SHA image pair.
# Auto-rollback on failed health checks still runs inside scripts/deploy-prod.sh on the VPS.
#
# Actions → Rollback VPS → Run workflow
#   target_sha empty → uses .deploy/previous-sha on the VPS
#   target_sha set   → rolls back to that git SHA image tags
name: Rollback VPS

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Rollback target SHA (empty = previous successful SHA on VPS)'
        required: false
        type: string

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  IMAGE_WEB_REPO: ghcr.io/techantumsolutions/itu/web
  IMAGE_SIDECAR_REPO: ghcr.io/techantumsolutions/itu/sidecar

jobs:
  rollback:
    name: Rollback VPS to previous SHA
    runs-on: ubuntu-latest
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TARGET_SHA,REDIS_PASSWORD,NEXT_PUBLIC_APP_URL
          script: |
            set -euo pipefail
            cd /var/www/itu

            echo "${{ secrets.VPS_GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ secrets.VPS_GITHUB_USERNAME }}" --password-stdin

            # Discard any local VPS edits so sync never conflicts with origin/main
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            chmod +x scripts/deploy-rollback.sh scripts/deploy-healthcheck.sh

            export REDIS_PASSWORD NEXT_PUBLIC_APP_URL
            if [ -n "${TARGET_SHA:-}" ]; then
              bash scripts/deploy-rollback.sh "$TARGET_SHA"
            else
              bash scripts/deploy-rollback.sh
            fi
