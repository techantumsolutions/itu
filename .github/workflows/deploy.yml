name: Build and Deploy (Registry)

on:
  push:
    branches:
      - main  # Trigger build/deploy when pushing to the main branch

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/techantumsolutions/itu/web:latest
  IMAGE_SIDECAR: ghcr.io/techantumsolutions/itu/sidecar:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.VPS_GITHUB_USERNAME }}
          password: ${{ secrets.VPS_GITHUB_TOKEN }}

      - name: Load web image build env
        run: |
          grep -v '^\s*#' .github/production.build.env | grep -v '^\s*$' >> "$GITHUB_ENV"
          # Optional repository variable overrides
          [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ] && echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" ] && echo "NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" ] && echo "NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_RECAPTCHA_ENABLED }}" ] && echo "NEXT_PUBLIC_RECAPTCHA_ENABLED=${{ vars.NEXT_PUBLIC_RECAPTCHA_ENABLED }}" >> "$GITHUB_ENV"

      - name: Validate web build-args
        run: |
          test -n "$NEXT_PUBLIC_APP_URL" || { echo "::error::NEXT_PUBLIC_APP_URL is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::error::NEXT_PUBLIC_SUPABASE_URL is missing"; exit 1; }

      - name: Build and push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ env.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
            NEXT_PUBLIC_RECAPTCHA_ENABLED=${{ env.NEXT_PUBLIC_RECAPTCHA_ENABLED }}

      - name: Build and push Sidecar Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sidecar
          push: true
          tags: ${{ env.IMAGE_SIDECAR }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/itu
            
            # Log in to GitHub Container Registry on the VPS
            echo "${{ secrets.VPS_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ secrets.VPS_GITHUB_USERNAME }} --password-stdin
            
            # Pull the latest compose configuration and migration scripts
            git pull origin main
            
            # Pull the newly pushed images
            docker compose -f docker-compose.prod.yml pull
            
            # Recreate containers with the new images
            docker compose -f docker-compose.prod.yml up -d
            
            # Run the database migration script in production
            npm run db:migrate:production
            
            # Clean up old docker images to save space
            docker image prune -f
