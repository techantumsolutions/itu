# Production deploy — main only, after quality gates, immutable SHA images, health-gated cutover.
# Architecture preserved: GHCR → SSH → Docker Compose on VPS.
name: Build and Deploy (Registry)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_WEB_REPO: ghcr.io/techantumsolutions/itu/web
  IMAGE_SIDECAR_REPO: ghcr.io/techantumsolutions/itu/sidecar

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write
  actions: write

jobs:
  # ── Quality gates (production: scanners hard-fail High/Critical) ──────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Run ESLint
        run: pnpm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Run TypeScript check
        run: pnpm run typecheck

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Run Jest with coverage
        run: pnpm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-main
          path: coverage/
          retention-days: 30

  audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: pnpm audit (production, high+) — hard-fail on deploy
        # Production deploys always hard-fail. PR CI remains configurable via CI_AUDIT_STRICT.
        run: pnpm run audit:prod

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  build-app:
    name: Build + standalone verify
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, audit, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Load web image build env
        run: |
          grep -v '^\s*#' .github/production.build.env | grep -v '^\s*$' >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ] && echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" ] && echo "NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" ] && echo "NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_RECAPTCHA_ENABLED }}" ] && echo "NEXT_PUBLIC_RECAPTCHA_ENABLED=${{ vars.NEXT_PUBLIC_RECAPTCHA_ENABLED }}" >> "$GITHUB_ENV"
      - name: Validate web build-args
        run: |
          test -n "$NEXT_PUBLIC_APP_URL" || { echo "::error::NEXT_PUBLIC_APP_URL is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::error::NEXT_PUBLIC_SUPABASE_URL is missing"; exit 1; }
      - name: Next.js production build
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ env.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          NEXT_PUBLIC_RECAPTCHA_ENABLED: ${{ env.NEXT_PUBLIC_RECAPTCHA_ENABLED }}
      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js
          test -d .next/standalone/node_modules
          test -d .next/static
          test -d public

  # ── Build, hard-scan, then push SHA (+ convenience :latest) ───────────────
  build-and-push:
    name: Docker build + scan + push
    runs-on: ubuntu-latest
    needs: [build-app, codeql]
    outputs:
      deploy_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.VPS_GITHUB_USERNAME }}
          password: ${{ secrets.VPS_GITHUB_TOKEN }}

      - name: Load web image build env
        run: |
          grep -v '^\s*#' .github/production.build.env | grep -v '^\s*$' >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ] && echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" ] && echo "NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" ] && echo "NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" >> "$GITHUB_ENV"
          [ -n "${{ vars.NEXT_PUBLIC_RECAPTCHA_ENABLED }}" ] && echo "NEXT_PUBLIC_RECAPTCHA_ENABLED=${{ vars.NEXT_PUBLIC_RECAPTCHA_ENABLED }}" >> "$GITHUB_ENV"

      - name: Validate web build-args
        run: |
          test -n "$NEXT_PUBLIC_APP_URL" || { echo "::error::NEXT_PUBLIC_APP_URL is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::error::NEXT_PUBLIC_SUPABASE_URL is missing"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web Image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            itu-web:candidate
            ${{ env.IMAGE_WEB_REPO }}:latest
            ${{ env.IMAGE_WEB_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=itu-web
          cache-to: type=gha,mode=max,scope=itu-web
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ env.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
            NEXT_PUBLIC_RECAPTCHA_ENABLED=${{ env.NEXT_PUBLIC_RECAPTCHA_ENABLED }}

      - name: Build Sidecar Image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sidecar
          push: false
          load: true
          tags: |
            itu-sidecar:candidate
            ${{ env.IMAGE_SIDECAR_REPO }}:latest
            ${{ env.IMAGE_SIDECAR_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=itu-sidecar
          cache-to: type=gha,mode=max,scope=itu-sidecar

      - name: Trivy scan web (before push) — hard-fail High/Critical
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: itu-web:candidate
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan sidecar (before push) — hard-fail High/Critical
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: itu-sidecar:candidate
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push Web Image (SHA immutable + convenience latest)
        run: |
          docker push ${{ env.IMAGE_WEB_REPO }}:${{ github.sha }}
          docker push ${{ env.IMAGE_WEB_REPO }}:latest

      - name: Push Sidecar Image (SHA immutable + convenience latest)
        run: |
          docker push ${{ env.IMAGE_SIDECAR_REPO }}:${{ github.sha }}
          docker push ${{ env.IMAGE_SIDECAR_REPO }}:latest

  # ── Deploy immutable SHA; migrate-before-cutover; health gate; auto-rollback ─
  # Auto-rollback on failed health checks runs inside scripts/deploy-prod.sh on the VPS.
  # Manual rollback: use the separate "Rollback VPS" workflow (rollback.yml).
  deploy:
    name: Deploy to VPS
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to VPS (SHA cutover)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ github.sha }}
          IMAGE_WEB: ${{ env.IMAGE_WEB_REPO }}:${{ github.sha }}
          IMAGE_SIDECAR: ${{ env.IMAGE_SIDECAR_REPO }}:${{ github.sha }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA,IMAGE_WEB,IMAGE_SIDECAR,REDIS_PASSWORD,NEXT_PUBLIC_APP_URL
          script: |
            set -euo pipefail
            cd /var/www/itu

            echo "${{ secrets.VPS_GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ secrets.VPS_GITHUB_USERNAME }}" --password-stdin

            # Sync deploy scripts + migrations; discard any local VPS edits so pull never conflicts
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            chmod +x scripts/deploy-prod.sh scripts/deploy-healthcheck.sh scripts/deploy-rollback.sh
            chmod +x k8s/scripts/*.sh 2>/dev/null || true

            # Production is K3s (ns/itu). deploy-prod.sh auto-detects and will NOT
            # bind Compose to :4009/:3001 while nginx owns the edge.
            export DEPLOY_SHA IMAGE_WEB IMAGE_SIDECAR REDIS_PASSWORD NEXT_PUBLIC_APP_URL
            export DEPLOY_ORCHESTRATOR="${DEPLOY_ORCHESTRATOR:-k8s}"
            bash scripts/deploy-prod.sh
