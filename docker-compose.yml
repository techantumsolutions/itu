# Minimal stack — Redis only (backward compatible with `npm run dev:stack`).
# Full development:  docker compose -f docker-compose.dev.yml up --build
# Production:        docker compose -f docker-compose.prod.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    container_name: itu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
