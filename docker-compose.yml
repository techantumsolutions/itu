services:
  redis:
    image: redis:7-alpine
    container_name: itu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itu-web
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - file_storage:/app/storage/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itu-worker
    restart: always
    command: npm run lcr:worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  file_storage:
